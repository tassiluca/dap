name: CI

on:
  push:
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  build-lib:
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-14] #, windows-2022 ]
        jvm-version: [17, 21]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up JDK ${{ matrix.jvm-version }}
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          distribution: "temurin"
          java-version: ${{ matrix.jvm-version }}
      - name: Setup LLVM
        uses: aminya/setup-cpp@v1
        with:
          compiler: llvm-17
          make: true
          clang: true
      - name: Install Boehm GC on Ubuntu
        if: startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y libgc-dev
      - name: Set up Homebrew
        if: startsWith(matrix.os, 'macos')
        uses: Homebrew/actions/setup-homebrew@d4a9d3894e99dfb50a41c089a3dfcbd6009152a1 # master
      - name: Install Boehm GC on MacOS
        if: startsWith(matrix.os, 'macos')
        run: brew install bdw-gc
      - name: Setup sbt launcher
        uses: sbt/setup-sbt@3afe9cf056c5d139bfc46579af1192d77a2f0821 # v1
      - name: Build shared library
        run: sbt +test
      - name: QA
        run: sbt scalafmtCheckAll

  build-native-examples:
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-14] #, windows-2022 ]
        jvm-version: [17, 21]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up JDK ${{ matrix.jvm-version }}
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          distribution: "temurin"
          java-version: ${{ matrix.jvm-version }}
      - name: Setup LLVM
        uses: aminya/setup-cpp@v1
        with:
          compiler: llvm-17
          make: true
          clang: true
      - name: Install Boehm GC on Ubuntu
        if: startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y libgc-dev
      - name: Set up Homebrew
        if: startsWith(matrix.os, 'macos')
        uses: Homebrew/actions/setup-homebrew@d4a9d3894e99dfb50a41c089a3dfcbd6009152a1 # master
      - name: Install Boehm GC on MacOS
        if: startsWith(matrix.os, 'macos')
        run: brew install bdw-gc
      - name: Setup sbt launcher
        uses: sbt/setup-sbt@3afe9cf056c5d139bfc46579af1192d77a2f0821 # v1
      - name: Build native examples
        run: cd dap-native-examples && ./gradlew build
